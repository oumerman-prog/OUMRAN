<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUMRAN ONLINE STORE</title>
    <style>
        :root { --bg: #000; --card: #fff; --accent: #d9534f; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin:0; background: var(--bg); color: white; text-align:center; 
            overflow-x: hidden; position: relative; min-height: 100vh;
        }

        /* MOTION SENSOR LOGO BACKGROUND */
        #motion-bg {
            position: fixed; top: 0; left: 0; width: 110%; height: 110%;
            background-image: url("IMG_8765.jpeg"); background-repeat: no-repeat;
            background-position: center; background-size: 70%;
            opacity: 0.22; z-index: -1;
            transform: translate(-5%, -5%); /* Offset for movement room */
            transition: transform 0.1s ease-out; /* Smooth motion */
        }
        
        /* LUXURY HEADER */
        header { 
            background: rgba(0,0,0,0.85); padding: 18px; border-bottom: 1px solid #333; 
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; 
            justify-content: center; gap: 12px; backdrop-filter: blur(15px);
            animation: slideDown 0.8s ease-out;
        }
        .header-logo { height: 35px; border-radius: 6px; }
        .brand-name { font-size: 15px; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; }

        .promo-bar { 
            background: #111; font-size: 10px; padding: 10px; color: #888; 
            text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; 
        }

        /* GRID & STAGGERED ENTRANCE */
        .product-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; 
            max-width: 1000px; margin: 0 auto; z-index: 1; 
        }

        .product { 
            background: var(--card); border-radius: 18px; color: black; position: relative; 
            overflow: hidden; display: flex; flex-direction: column; cursor: pointer; 
            transition: all 0.3s ease; opacity: 0; transform: translateY(30px);
            animation: cardFade 0.6s forwards;
        }
        .product:active { transform: scale(0.96); }

        .image-slider { height: 180px; background: #f4f4f4; overflow: hidden; }
        .image-slider img { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 12px; text-align: left; }
        .product h3 { font-size: 11px; margin: 0; text-transform: uppercase; color: #444; }
        .new-price { font-weight: 900; font-size: 16px; color: #000; margin-top: 4px; display: block; }

        /* MODAL POPUP */
        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); 
        }
        .modal-content { 
            background: white; color: black; margin: 12% auto; padding: 30px; width: 85%; max-width: 380px; 
            border-radius: 30px; text-align: left; animation: modalSlide 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* KEYFRAMES */
        @keyframes cardFade { to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { transform: translateY(-100%); } }
        @keyframes modalSlide { from { transform: translateY(50px); opacity: 0; } }
        
        .product:nth-child(1) { animation-delay: 0.1s; }
        .product:nth-child(2) { animation-delay: 0.2s; }
        .product:nth-child(3) { animation-delay: 0.3s; }
        .product:nth-child(4) { animation-delay: 0.4s; }

        .order-btn { 
            width: 100%; padding: 18px; background: black; color: white; border: none; 
            border-radius: 18px; font-weight: 900; margin-top: 20px; cursor: pointer;
        }

        #payment-info { display: none; background: #fff1f1; padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid #ffdcdc; }
        .copy-btn { background: black; color: white; border: none; padding: 6px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div id="motion-bg"></div>

<header>
    <img src="IMG_8765.jpeg" alt="Logo" class="header-logo">
    <span class="brand-name">OUMRAN ONLINE STORE📲</span>
</header>

<div class="promo-bar">Premium Quality • Global Shipping</div>

<div class="product-grid">
    <div class="product" onclick="openSpace('OUMRAN Street Hoodie', '$35', 'Luxury cotton streetwear.', 'clothe')">
        <div class="image-slider"><img src="https://via.placeholder.com/400x400/eee?text=CLOTHING"></div>
        <div class="product-info"><h3>Street Hoodie</h3><span class="new-price">$35</span></div>
    </div>

    <div class="product" onclick="openSpace('OUMRAN Sport Kicks', '$60', 'High-performance sneakers.', 'shoes')">
        <div class="image-slider"><img src="https://via.placeholder.com/400x400/ddd?text=SHOES"></div>
        <div class="product-info"><h3>Sport Kicks</h3><span class="new-price">$60</span></div>
    </div>

    <div class="product" onclick="openSpace('OUMRAN Silver Chain', '$20', 'Signature designer chain.', 'accessory')">
        <div class="image-slider"><img src="https://via.placeholder.com/400x400/ccc?text=ACCESSORY"></div>
        <div class="product-info"><h3>Silver Chain</h3><span class="new-price">$20</span></div>
    </div>

    <div class="product" onclick="openSpace('OUMRAN Mini Bag', '$45', 'Exclusive woman bag collection.', 'bag')">
        <div class="image-slider"><img src="https://via.placeholder.com/400x400/bbb?text=BAGS"></div>
        <div class="product-info"><h3>Mini Bag</h3><span class="new-price">$45</span></div>
    </div>
</div>

<div id="productModal" class="modal">
  <div class="modal-content">
    <span onclick="closeSpace()" style="float:right; cursor:pointer; font-weight:bold; font-size:22px; color:#ccc;">✕</span>
    <h2 id="m-title" style="margin:0; font-size: 20px;">Product</h2>
    <p id="m-desc" style="color:#666; font-size: 13px; margin: 10px 0 20px 0;"></p>
    
    <label style="font-size: 10px; font-weight: 900; color: #bbb; letter-spacing: 1px;">SELECT SIZE</label>
    <select id="size-dropdown" style="width:100%; padding:16px; margin-top:8px; border-radius:15px; border: 1px solid #eee; background:#f9f9f9; font-weight: bold;"></select>
    
    <button id="order-now-btn" class="order-btn" onclick="sendOrderIntent()">Confirm Order</button>

    <div id="payment-info">
        <p style="font-weight:900; color: #d9534f; margin: 0 0 10px 0;">Order Sent! ✅</p>
        <p style="font-size: 13px; margin: 5px 0;">0939620004 <button class="copy-btn" onclick="copyNum('0939620004')">COPY</button></p>
        <p style="font-size: 13px; margin: 5px 0;">0940028820 <button class="copy-btn" onclick="copyNum('0940028820')">COPY</button></p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <p style="font-size: 12px;"><strong>Message us on Telegram:</strong></p>
        <a href="https://t.me/OUMER_FETE" style="color:black; font-weight:bold; text-decoration:none; border-bottom:1px solid #000;">@OUMER_FETE</a>
    </div>
  </div>
</div>

<script>
// TILT MOTION SENSOR LOGIC
const bg = document.getElementById('motion-bg');
window.addEventListener('deviceorientation', (event) => {
    const x = event.gamma; // tilt left/right
    const y = event.beta;  // tilt front/back
    
    if (x && y) {
        // Subtle move range of 20 pixels
        const moveX = (x / 45) * 10;
        const moveY = (y / 45) * 10;
        bg.style.transform = `translate(calc(-5% + ${moveX}px), calc(-5% + ${moveY}px))`;
    }
});

const sizes = {
    clothe: ["Small", "Medium", "Large", "XL"],
    shoes: ["39", "40EUR", "41", "42", "43", "44"],
    accessory: ["One Size"],
    bag: ["Standard Size"]
};

function openSpace(name, price, desc, type) {
    document.getElementById("m-title").innerText = name + " - " + price;
    document.getElementById("m-desc").innerText = desc;
    let dropdown = document.getElementById("size-dropdown");
    dropdown.innerHTML = "";
    (sizes[type] || sizes.clothe).forEach(s => {
        let opt = document.createElement("option");
        opt.value = s; opt.innerHTML = s; dropdown.appendChild(opt);
    });
    document.getElementById("productModal").style.display = "block";
    document.getElementById("payment-info").style.display = "none";
    document.getElementById("order-now-btn").style.display = "block";
}

function sendOrderIntent() {
    fetch("https://formspree.io/f/xkoqwjke", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Product: document.getElementById("m-title").innerText, Size: document.getElementById("size-dropdown").value })
    });
    document.getElementById("payment-info").style.display = "block";
    document.getElementById("order-now-btn").style.display = "none";
}

function copyNum(num) {
    navigator.clipboard.writeText(num);
    alert("Copied: " + num);
}

function closeSpace() { document.getElementById("productModal").style.display = "none"; }
window.onclick = function(e) { if (e.target == document.getElementById("productModal")) closeSpace(); }
</script>
</body>
</html>
